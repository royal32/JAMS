services:
  qbittorrent:
    # Use this override when qBittorrent runs natively on the macOS host.
    # The service remains defined in the base compose file, but assigning it a
    # non-default profile keeps it from starting unless explicitly requested.
    profiles:
      - container-qbittorrent
  radarr:
    extra_hosts:
      - "host.docker.internal:host-gateway"
  sonarr:
    extra_hosts:
      - "host.docker.internal:host-gateway"
